name: Publish Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: "Release tag, branch, or commit SHA to publish"
        required: true
        default: "main"
      target:
        description: "Registry target passed to publish-packages.yml"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - npm
          - pypi
          - crates
          - rubygems
          - nuget
          - packagist
          - maven
          - verify
      dry_run:
        description: "Dispatch publish-packages.yml in dry-run mode"
        required: true
        type: boolean
        default: true
      include_unity_npm:
        description: "Include the Unity UPM-compatible npm package"
        required: true
        type: boolean
        default: false
      npm_packages:
        description: "Comma-separated npm package names or dirs passed to publish-packages.yml; empty means all"
        required: false
        type: string
        default: ""
      include_pypi_extras:
        description: "Include FastAPI and Django PyPI packages"
        required: true
        type: boolean
        default: true
      include_crates_publish:
        description: "Include real crates.io publishing"
        required: true
        type: boolean
        default: true
      include_packagist_update:
        description: "Trigger Packagist update hook"
        required: true
        type: boolean
        default: false
      include_maven_publish:
        description: "Include real Maven Central publishing"
        required: true
        type: boolean
        default: false
      include_go_module:
        description: "Verify the Go module from public tags"
        required: true
        type: boolean
        default: false

permissions:
  actions: write
  contents: read

concurrency:
  group: publish-release-${{ github.event.release.tag_name || inputs.ref }}
  cancel-in-progress: false

jobs:
  dispatch-publish:
    name: Dispatch package publishing
    runs-on: ubuntu-latest
    steps:
      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - id: release
        name: Resolve release publish inputs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_TARGET: ${{ inputs.target }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_INCLUDE_UNITY_NPM: ${{ inputs.include_unity_npm }}
          INPUT_NPM_PACKAGES: ${{ inputs.npm_packages }}
          INPUT_INCLUDE_PYPI_EXTRAS: ${{ inputs.include_pypi_extras }}
          INPUT_INCLUDE_CRATES_PUBLISH: ${{ inputs.include_crates_publish }}
          INPUT_INCLUDE_PACKAGIST_UPDATE: ${{ inputs.include_packagist_update }}
          INPUT_INCLUDE_MAVEN_PUBLISH: ${{ inputs.include_maven_publish }}
          INPUT_INCLUDE_GO_MODULE: ${{ inputs.include_go_module }}
        run: |
          set -Eeuo pipefail

          publish_packages="true"
          release_kind="manual"

          if [[ "$EVENT_NAME" == "release" ]]; then
            ref="$RELEASE_TAG"
            if [[ "$RELEASE_TAG" == */* ]]; then
              publish_packages="false"
              release_kind="scoped"
              target="verify"
              dry_run="true"
              include_unity_npm="false"
              npm_packages=""
              include_pypi_extras="false"
              include_crates_publish="false"
              include_packagist_update="false"
              include_maven_publish="false"
              include_go_module="false"
            elif [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              release_kind="repo-wide"
              target="all"
              dry_run="false"
              include_unity_npm="false"
              npm_packages=""
              include_pypi_extras="true"
              include_crates_publish="true"
              include_packagist_update="true"
              include_maven_publish="true"
              include_go_module="false"
            else
              echo "Published GitHub Releases must use a repo-wide vMAJOR.MINOR.PATCH tag or a scoped package tag containing '/': $RELEASE_TAG" >&2
              exit 1
            fi
          else
            ref="$INPUT_REF"
            target="$INPUT_TARGET"
            dry_run="$INPUT_DRY_RUN"
            include_unity_npm="$INPUT_INCLUDE_UNITY_NPM"
            npm_packages="$INPUT_NPM_PACKAGES"
            include_pypi_extras="$INPUT_INCLUDE_PYPI_EXTRAS"
            include_crates_publish="$INPUT_INCLUDE_CRATES_PUBLISH"
            include_packagist_update="$INPUT_INCLUDE_PACKAGIST_UPDATE"
            include_maven_publish="$INPUT_INCLUDE_MAVEN_PUBLISH"
            include_go_module="$INPUT_INCLUDE_GO_MODULE"
          fi

          {
            echo "publish_packages=$publish_packages"
            echo "release_kind=$release_kind"
            echo "ref=$ref"
            echo "target=$target"
            echo "dry_run=$dry_run"
            echo "include_unity_npm=$include_unity_npm"
            echo "npm_packages=$npm_packages"
            echo "include_pypi_extras=$include_pypi_extras"
            echo "include_crates_publish=$include_crates_publish"
            echo "include_packagist_update=$include_packagist_update"
            echo "include_maven_publish=$include_maven_publish"
            echo "include_go_module=$include_go_module"
          } >> "$GITHUB_OUTPUT"

      - name: Guard repo-wide release package versions
        if: ${{ steps.release.outputs.release_kind == 'repo-wide' }}
        env:
          REF: ${{ steps.release.outputs.ref }}
        run: python3 scripts/check_repo_wide_release_versions.py "$REF"

      - name: Dispatch publish-packages.yml
        if: ${{ steps.release.outputs.publish_packages == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ steps.release.outputs.ref }}
          TARGET: ${{ steps.release.outputs.target }}
          DRY_RUN: ${{ steps.release.outputs.dry_run }}
          INCLUDE_UNITY_NPM: ${{ steps.release.outputs.include_unity_npm }}
          NPM_PACKAGES: ${{ steps.release.outputs.npm_packages }}
          INCLUDE_PYPI_EXTRAS: ${{ steps.release.outputs.include_pypi_extras }}
          INCLUDE_CRATES_PUBLISH: ${{ steps.release.outputs.include_crates_publish }}
          INCLUDE_PACKAGIST_UPDATE: ${{ steps.release.outputs.include_packagist_update }}
          INCLUDE_MAVEN_PUBLISH: ${{ steps.release.outputs.include_maven_publish }}
          INCLUDE_GO_MODULE: ${{ steps.release.outputs.include_go_module }}
        run: |
          set -Eeuo pipefail
          gh workflow run publish-packages.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f ref="$REF" \
            -f target="$TARGET" \
            -f dry_run="$DRY_RUN" \
            -f include_unity_npm="$INCLUDE_UNITY_NPM" \
            -f npm_packages="$NPM_PACKAGES" \
            -f include_pypi_extras="$INCLUDE_PYPI_EXTRAS" \
            -f include_crates_publish="$INCLUDE_CRATES_PUBLISH" \
            -f include_packagist_update="$INCLUDE_PACKAGIST_UPDATE" \
            -f include_maven_publish="$INCLUDE_MAVEN_PUBLISH" \
            -f include_go_module="$INCLUDE_GO_MODULE"

      - name: Summarize release publish decision
        env:
          PUBLISH_PACKAGES: ${{ steps.release.outputs.publish_packages }}
          RELEASE_KIND: ${{ steps.release.outputs.release_kind }}
          REF: ${{ steps.release.outputs.ref }}
          TARGET: ${{ steps.release.outputs.target }}
          DRY_RUN: ${{ steps.release.outputs.dry_run }}
          INCLUDE_UNITY_NPM: ${{ steps.release.outputs.include_unity_npm }}
          NPM_PACKAGES: ${{ steps.release.outputs.npm_packages }}
          INCLUDE_PYPI_EXTRAS: ${{ steps.release.outputs.include_pypi_extras }}
          INCLUDE_CRATES_PUBLISH: ${{ steps.release.outputs.include_crates_publish }}
          INCLUDE_PACKAGIST_UPDATE: ${{ steps.release.outputs.include_packagist_update }}
          INCLUDE_MAVEN_PUBLISH: ${{ steps.release.outputs.include_maven_publish }}
          INCLUDE_GO_MODULE: ${{ steps.release.outputs.include_go_module }}
        run: |
          set -Eeuo pipefail

          {
            if [[ "$PUBLISH_PACKAGES" == "true" ]]; then
              echo "Dispatched package publishing:"
            else
              echo "Skipped package publishing for scoped GitHub Release:"
            fi
            echo "- release kind: \`$RELEASE_KIND\`"
            echo "- ref: \`$REF\`"
            echo "- target: \`$TARGET\`"
            echo "- dry_run: \`$DRY_RUN\`"
            echo "- include_unity_npm: \`$INCLUDE_UNITY_NPM\`"
            echo "- npm_packages: \`$NPM_PACKAGES\`"
            echo "- include_pypi_extras: \`$INCLUDE_PYPI_EXTRAS\`"
            echo "- include_crates_publish: \`$INCLUDE_CRATES_PUBLISH\`"
            echo "- include_packagist_update: \`$INCLUDE_PACKAGIST_UPDATE\`"
            echo "- include_maven_publish: \`$INCLUDE_MAVEN_PUBLISH\`"
            echo "- include_go_module: \`$INCLUDE_GO_MODULE\`"
          } >> "$GITHUB_STEP_SUMMARY"
