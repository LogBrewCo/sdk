name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Release tag or commit SHA to publish"
        required: true
        default: "v0.1.0"
      target:
        description: "Registry target"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - npm
          - pypi
          - crates
          - rubygems
          - nuget
          - packagist
          - maven
          - verify
      dry_run:
        description: "Validate and package without publishing"
        required: true
        type: boolean
        default: true
      include_unity_npm:
        description: "Include the Unity UPM-compatible npm package"
        required: true
        type: boolean
        default: false
      include_pypi_extras:
        description: "Publish FastAPI/Django PyPI packages after their publishers are configured"
        required: true
        type: boolean
        default: false
      include_crates_publish:
        description: "Publish the Rust crate after crates.io ownership/trusted publishing is configured"
        required: true
        type: boolean
        default: false
      include_go_module:
        description: "Verify the Go module can be installed from public tags"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-packages-${{ inputs.ref }}-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  npm:
    name: npm packages
    if: ${{ inputs.target == 'all' || inputs.target == 'npm' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      DRY_RUN: ${{ inputs.dry_run }}
      INCLUDE_UNITY_NPM: ${{ inputs.include_unity_npm }}
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify publish metadata
        run: python3 scripts/check_release_metadata.py

      - name: Publish npm packages
        shell: bash
        run: |
          set -Eeuo pipefail

          package_dirs=(
            js/logbrew-js
            js/logbrew-browser
            js/logbrew-node
            js/logbrew-express
            js/logbrew-fastify
            js/logbrew-nestjs
            js/logbrew-angular
            js/logbrew-vue
            js/logbrew-svelte
            js/logbrew-react
            js/logbrew-react-native
            js/logbrew-next
          )

          if [[ "$INCLUDE_UNITY_NPM" == "true" ]]; then
            package_dirs+=(unity/logbrew-unity)
          fi

          for package_dir in "${package_dirs[@]}"; do
            package_name="$(node -p "require('./${package_dir}/package.json').name")"
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "Packing ${package_name} from ${package_dir}"
              (cd "$package_dir" && npm pack --dry-run)
              continue
            fi
            publish_args=()
            if [[ "$package_name" == @*/* ]]; then
              publish_args+=(--access public)
            fi

            echo "Publishing ${package_name} from ${package_dir}"
            (cd "$package_dir" && npm publish "${publish_args[@]}")
          done

      - name: Verify public npm packages
        if: ${{ ! inputs.dry_run }}
        shell: bash
        run: |
          set -Eeuo pipefail
          verify_args=(--target npm)
          if [[ "$INCLUDE_UNITY_NPM" == "true" ]]; then
            verify_args+=(--include-unity-npm)
          fi
          python3 scripts/check_registry_publication.py "${verify_args[@]}"

  pypi:
    name: PyPI packages
    if: ${{ inputs.target == 'all' || inputs.target == 'pypi' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build Python distributions
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade build twine
          for package_dir in python/logbrew_py python/logbrew_fastapi python/logbrew_django; do
            output_dir="dist/pypi/$(basename "$package_dir")"
            python -m build --sdist --wheel --outdir "$output_dir" "$package_dir"
            python -m twine check "$output_dir"/*
          done

      - name: Publish logbrew-sdk to PyPI
        if: ${{ ! inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi/logbrew_py

      - name: Publish logbrew-fastapi to PyPI
        if: ${{ ! inputs.dry_run && inputs.include_pypi_extras }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi/logbrew_fastapi

      - name: Publish logbrew-django to PyPI
        if: ${{ ! inputs.dry_run && inputs.include_pypi_extras }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi/logbrew_django

      - name: Explain skipped PyPI extras
        if: ${{ ! inputs.dry_run && ! inputs.include_pypi_extras }}
        run: |
          echo "Published core logbrew-sdk only."
          echo "Set include_pypi_extras=true after logbrew-fastapi and logbrew-django PyPI publishers are configured."

      - name: Verify public PyPI packages
        if: ${{ ! inputs.dry_run }}
        shell: bash
        run: |
          set -Eeuo pipefail
          verify_args=(--target pypi)
          if [[ "${{ inputs.include_pypi_extras }}" == "true" ]]; then
            verify_args+=(--include-pypi-extras)
          fi
          python3 scripts/check_registry_publication.py "${verify_args[@]}"

  crates:
    name: crates.io package
    if: ${{ inputs.target == 'all' || inputs.target == 'crates' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Dry-run crate package
        working-directory: rust/logbrew
        run: cargo publish --dry-run

      - name: Authenticate to crates.io
        if: ${{ ! inputs.dry_run && inputs.include_crates_publish }}
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        if: ${{ ! inputs.dry_run && inputs.include_crates_publish }}
        working-directory: rust/logbrew
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: cargo publish

      - name: Set up Python for registry verification
        if: ${{ ! inputs.dry_run && inputs.include_crates_publish }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify public crates.io package
        if: ${{ ! inputs.dry_run && inputs.include_crates_publish }}
        run: python3 scripts/check_registry_publication.py --target crates

      - name: Explain skipped crate publish
        if: ${{ ! inputs.dry_run && ! inputs.include_crates_publish && inputs.target == 'all' }}
        run: |
          echo "Validated the Rust crate dry-run only."
          echo "Set include_crates_publish=true after the logbrew crate ownership/trusted publishing path is configured."

      - name: Refuse implicit crate-only publish
        if: ${{ ! inputs.dry_run && ! inputs.include_crates_publish && inputs.target == 'crates' }}
        run: |
          echo "Refusing a real crates.io publish without include_crates_publish=true."
          echo "Configure the logbrew crate ownership/trusted publishing path first, then rerun target=crates with include_crates_publish=true."
          exit 1

  rubygems:
    name: RubyGems package
    if: ${{ inputs.target == 'all' || inputs.target == 'rubygems' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build gem
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p dist/rubygems
          (
            cd ruby/logbrew-ruby
            gem build logbrew-sdk.gemspec --strict --output "$GITHUB_WORKSPACE/dist/rubygems/logbrew-sdk-0.1.0.gem"
          )

      - name: Configure RubyGems trusted publishing credentials
        if: ${{ ! inputs.dry_run }}
        uses: rubygems/configure-rubygems-credentials@v2.0.0

      - name: Publish gem
        if: ${{ ! inputs.dry_run }}
        run: gem push dist/rubygems/logbrew-sdk-0.1.0.gem

      - name: Set up Python for registry verification
        if: ${{ ! inputs.dry_run }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify public RubyGems package
        if: ${{ ! inputs.dry_run }}
        run: python3 scripts/check_registry_publication.py --target rubygems

  nuget:
    name: NuGet package
    if: ${{ inputs.target == 'all' || inputs.target == 'nuget' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Pack NuGet package
        run: dotnet pack dotnet/logbrew-dotnet/src/LogBrew/LogBrew.csproj --configuration Release --output dist/nuget

      - name: Authenticate to NuGet
        if: ${{ ! inputs.dry_run }}
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet package
        if: ${{ ! inputs.dry_run }}
        run: dotnet nuget push dist/nuget/*.nupkg --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json

      - name: Set up Python for registry verification
        if: ${{ ! inputs.dry_run }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify public NuGet package
        if: ${{ ! inputs.dry_run }}
        run: python3 scripts/check_registry_publication.py --target nuget

  packagist:
    name: Packagist package
    if: ${{ inputs.target == 'packagist' || (inputs.target == 'all' && inputs.dry_run) }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    env:
      PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
      PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Validate Composer packages
        shell: bash
        run: |
          set -Eeuo pipefail
          composer validate --strict composer.json
          composer validate --strict php/logbrew-php/composer.json

      - name: Trigger Packagist update
        if: ${{ ! inputs.dry_run }}
        shell: bash
        run: |
          set -Eeuo pipefail
          : "${PACKAGIST_USERNAME:?Set PACKAGIST_USERNAME as a release environment secret.}"
          : "${PACKAGIST_API_TOKEN:?Set PACKAGIST_API_TOKEN as a release environment secret.}"
          curl -fsS \
            -X POST \
            -H "content-type: application/json" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            -d '{"repository":{"url":"https://github.com/LogBrewCo/sdk"}}'

      - name: Set up Python for registry verification
        if: ${{ ! inputs.dry_run }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify public Packagist package
        if: ${{ ! inputs.dry_run }}
        run: python3 scripts/check_registry_publication.py --target packagist

  maven:
    name: Maven Central preflight
    if: ${{ inputs.target == 'maven' || (inputs.target == 'all' && inputs.dry_run) }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Run Java and Kotlin package preflight
        run: |
          bash scripts/check_java_package.sh
          bash scripts/check_kotlin_package.sh

      - name: Explain Maven Central publish state
        if: ${{ ! inputs.dry_run }}
        run: |
          echo "Maven Central does not currently offer first-party GitHub OIDC trusted publishing."
          echo "The co.logbrew Maven Central namespace is verified."
          echo "The Java and Kotlin SDKs pass package preflight, but real Maven Central publish still needs Central Portal credentials, signing keys, source/javadoc artifacts, and a repository release profile."
          exit 1

  verify:
    name: Public registry verification
    if: ${{ inputs.target == 'verify' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Go for module verification
        if: ${{ inputs.include_go_module }}
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Verify public registry packages
        shell: bash
        run: |
          set -Eeuo pipefail
          verify_args=(--target all)
          if [[ "${{ inputs.include_unity_npm }}" == "true" ]]; then
            verify_args+=(--include-unity-npm)
          fi
          if [[ "${{ inputs.include_pypi_extras }}" == "true" ]]; then
            verify_args+=(--include-pypi-extras)
          fi
          if [[ "${{ inputs.include_crates_publish }}" == "true" ]]; then
            verify_args+=(--include-crates)
          fi
          if [[ "${{ inputs.include_go_module }}" == "true" ]]; then
            verify_args+=(--include-go)
          fi
          python3 scripts/check_registry_publication.py "${verify_args[@]}"
