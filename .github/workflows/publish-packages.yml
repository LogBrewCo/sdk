name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Release tag or commit SHA to publish"
        required: true
        default: "v0.1.0"
      target:
        description: "Registry target"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - npm
          - pypi
          - crates
          - rubygems
          - nuget
          - packagist
          - maven
          - verify
      dry_run:
        description: "Validate and package without publishing"
        required: true
        type: boolean
        default: true
      include_unity_npm:
        description: "Include the Unity UPM-compatible npm package"
        required: true
        type: boolean
        default: false
      npm_packages:
        description: "Comma-separated npm package names or dirs to publish; empty publishes all npm packages"
        required: false
        type: string
        default: ""
      allow_initial_npm_publish:
        description: "Allow one-time authenticated first publish for npm package names whose package pages do not exist yet"
        required: true
        type: boolean
        default: false
      use_scoped_npm_fallback:
        description: "Use the release environment npm publish value for scoped existing-package publishes when trusted publishing is not configured"
        required: true
        type: boolean
        default: false
      include_pypi_extras:
        description: "Publish FastAPI/Django PyPI packages after their publishers are configured"
        required: true
        type: boolean
        default: false
      include_crates_publish:
        description: "Publish the Rust crate after crates.io ownership/trusted publishing is configured"
        required: true
        type: boolean
        default: false
      include_packagist_update:
        description: "Trigger Packagist update hook after package ownership is ready"
        required: true
        type: boolean
        default: false
      include_maven_publish:
        description: "Publish Maven Central bundle after release settings are ready"
        required: true
        type: boolean
        default: false
      include_go_module:
        description: "Verify the Go module can be installed from public tags"
        required: true
        type: boolean
        default: false
      verify_version:
        description: "Default public package version expected by target=verify; empty uses verifier default"
        required: false
        type: string
        default: ""
      verify_npm_versions:
        description: "Comma-separated npm PACKAGE=VERSION overrides for target=verify"
        required: false
        type: string
        default: ""
      verify_pypi_versions:
        description: "Comma-separated PyPI PACKAGE=VERSION overrides for target=verify"
        required: false
        type: string
        default: ""
      verify_nuget_versions:
        description: "Comma-separated NuGet PACKAGE=VERSION overrides for target=verify"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: publish-packages-${{ inputs.ref }}-${{ inputs.target }}-${{ inputs.npm_packages }}
  cancel-in-progress: false

jobs:
  npm:
    name: npm packages
    if: ${{ inputs.target == 'all' || inputs.target == 'npm' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      DRY_RUN: ${{ inputs.dry_run }}
      INCLUDE_UNITY_NPM: ${{ inputs.include_unity_npm }}
      NPM_PACKAGES: ${{ inputs.npm_packages }}
      ALLOW_INITIAL_NPM_PUBLISH: ${{ inputs.allow_initial_npm_publish }}
      USE_SCOPED_NPM_FALLBACK: ${{ inputs.use_scoped_npm_fallback }}
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Publish npm packages
        id: npm-packages
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -Eeuo pipefail

          package_dirs=(
            js/logbrew-js
            js/logbrew-browser
            js/logbrew-node
            js/logbrew-bullmq
            js/logbrew-kafkajs
            js/logbrew-amqplib
            js/logbrew-aws-sqs
            js/logbrew-express
            js/logbrew-fastify
            js/logbrew-nestjs
            js/logbrew-angular
            js/logbrew-vue
            js/logbrew-svelte
            js/logbrew-react
            js/logbrew-react-native
            js/logbrew-next
          )

          select_npm_package_dirs() {
            local selectors="$1"
            shift
            local all_package_dirs=("$@")
            local selected_package_dirs=()
            local requested_packages=()

            if [[ -z "$selectors" ]]; then
              printf '%s\n' "${all_package_dirs[@]}"
              return
            fi

            IFS=',' read -ra requested_packages <<< "$selectors"
            for requested_package in "${requested_packages[@]}"; do
              requested_package="$(printf '%s' "$requested_package" | xargs)"
              if [[ -z "$requested_package" ]]; then
                continue
              fi
              local matched="false"
              local package_name
              for package_dir in "${all_package_dirs[@]}"; do
                package_name="$(node -p "require('./${package_dir}/package.json').name")"
                if [[ "$requested_package" != "$package_dir" && "$requested_package" != "$package_name" ]]; then
                  continue
                fi
                matched="true"
                if [[ " ${selected_package_dirs[*]} " != *" ${package_dir} "* ]]; then
                  selected_package_dirs+=("$package_dir")
                fi
                break
              done
              if [[ "$matched" != "true" ]]; then
                echo "Unknown npm package selector: $requested_package" >&2
                exit 1
              fi
            done

            if [[ "${#selected_package_dirs[@]}" -eq 0 ]]; then
              echo "npm_packages did not include any package selectors" >&2
              exit 1
            fi
            printf '%s\n' "${selected_package_dirs[@]}"
          }

          mapfile -t package_dirs < <(select_npm_package_dirs "$NPM_PACKAGES" "${package_dirs[@]}")

          if [[ "$INCLUDE_UNITY_NPM" == "true" ]]; then
            package_dirs+=(unity/logbrew-unity)
          fi

          metadata_args=()
          selected_package_names=()
          selected_package_versions=()
          for package_dir in "${package_dirs[@]}"; do
            package_name="$(node -p "require('./${package_dir}/package.json').name")"
            package_version="$(node -p "require('./${package_dir}/package.json').version")"
            selected_package_names+=("$package_name")
            selected_package_versions+=("$package_name=$package_version")
            if [[ -n "$NPM_PACKAGES" && "$package_dir" == js/logbrew-* ]]; then
              metadata_args+=(--npm-version "$package_name=$package_version")
            fi
          done

          python3 scripts/check_release_metadata.py "${metadata_args[@]}"

          npm_version="$(npm --version)"
          node_version="$(node --version)"
          echo "npm ${npm_version} on ${node_version}"
          node -e '
            const version = process.argv[1].split(/[.-]/).map(Number);
            const minimum = [11, 5, 1];
            for (let index = 0; index < minimum.length; index += 1) {
              const actual = version[index] || 0;
              if (actual > minimum[index]) process.exit(0);
              if (actual < minimum[index]) {
                console.error(`npm trusted publishing requires npm >= ${minimum.join(".")}; found ${process.argv[1]}`);
                process.exit(1);
              }
            }
          ' "$npm_version"

          missing_npm_packages=()
          if [[ "$DRY_RUN" != "true" ]]; then
            for package_name in "${selected_package_names[@]}"; do
              if [[ "$package_name" == "co.logbrew.unity" ]]; then
                continue
              fi
              if ! npm view "$package_name" version --registry "https://registry.npmjs.org" >/dev/null 2>&1; then
                missing_npm_packages+=("$package_name")
              fi
            done
          fi

          npm_userconfig="$(mktemp)"
          trap 'rm -f "$npm_userconfig"' EXIT
          printf 'registry=https://registry.npmjs.org/\n' > "$npm_userconfig"
          export NPM_CONFIG_USERCONFIG="$npm_userconfig"
          unset NODE_AUTH_TOKEN

          if [[ "$USE_SCOPED_NPM_FALLBACK" == "true" ]]; then
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "use_scoped_npm_fallback=true is only valid for real npm publishes." >&2
              exit 1
            fi
            if [[ -z "$NPM_PACKAGES" ]]; then
              echo "use_scoped_npm_fallback=true requires a scoped npm_packages selection." >&2
              exit 1
            fi
            if [[ -z "${NPM_TOKEN:-}" ]]; then
              echo "use_scoped_npm_fallback=true requires the release environment npm publish value." >&2
              exit 1
            fi
            printf '//registry.npmjs.org/:_authToken=%s\nregistry=https://registry.npmjs.org/\n' "$NPM_TOKEN" > "$npm_userconfig"
          elif [[ "${#missing_npm_packages[@]}" -gt 0 ]]; then
            printf 'Missing npm package pages before publish:\n' >&2
            printf -- '- %s\n' "${missing_npm_packages[@]}" >&2
            if [[ "$ALLOW_INITIAL_NPM_PUBLISH" != "true" ]]; then
              echo "npm trusted publishing requires existing package pages for these names." >&2
              echo "Run a one-time authenticated first publish, or rerun with allow_initial_npm_publish=true after adding the release environment npm publish value, then configure trusted publishers for repeat OIDC publishes." >&2
              exit 1
            fi
            if [[ -z "${NPM_TOKEN:-}" ]]; then
              echo "allow_initial_npm_publish=true requires the release environment npm publish value for one-time authenticated package creation." >&2
              exit 1
            fi
            printf '//registry.npmjs.org/:_authToken=%s\nregistry=https://registry.npmjs.org/\n' "$NPM_TOKEN" > "$npm_userconfig"
          elif [[ "$ALLOW_INITIAL_NPM_PUBLISH" == "true" ]]; then
            echo "allow_initial_npm_publish=true is only for brand-new npm package pages; all selected packages already exist." >&2
            exit 1
          fi

          for package_dir in "${package_dirs[@]}"; do
            package_name="$(node -p "require('./${package_dir}/package.json').name")"
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "Packing ${package_name} from ${package_dir}"
              (cd "$package_dir" && npm pack --dry-run)
              continue
            fi
            publish_args=()
            if [[ "$package_name" == @*/* ]]; then
              publish_args+=(--access public)
            fi

            echo "Publishing ${package_name} from ${package_dir}"
            (cd "$package_dir" && npm publish "${publish_args[@]}")
          done

          {
            echo "selected_packages<<EOF"
            printf '%s\n' "${selected_package_names[@]}"
            echo "EOF"
            echo "selected_package_versions<<EOF"
            printf '%s\n' "${selected_package_versions[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Verify public npm packages
        if: ${{ ! inputs.dry_run }}
        shell: bash
        run: |
          set -Eeuo pipefail
          verify_args=(--target npm)

          while IFS= read -r package_name; do
            if [[ -n "$package_name" && "$package_name" != "co.logbrew.unity" ]]; then
              verify_args+=(--npm-package "$package_name")
            fi
          done <<< "${{ steps.npm-packages.outputs.selected_packages }}"
          while IFS= read -r package_version; do
            if [[ -n "$package_version" && "$package_version" != co.logbrew.unity=* ]]; then
              verify_args+=(--npm-version "$package_version")
            fi
          done <<< "${{ steps.npm-packages.outputs.selected_package_versions }}"

          if [[ "$INCLUDE_UNITY_NPM" == "true" ]]; then
            verify_args+=(--include-unity-npm)
          fi
          python3 scripts/check_registry_publication.py "${verify_args[@]}" --retries 20 --retry-delay 15

  pypi:
    name: PyPI packages
    if: ${{ inputs.target == 'all' || inputs.target == 'pypi' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Read Python package versions
        id: pypi-version
        shell: bash
        run: |
          set -Eeuo pipefail
          source scripts/python_package_version.sh
          core_version="$(python_package_version python/logbrew_py/pyproject.toml)"
          fastapi_version="$(python_package_version python/logbrew_fastapi/pyproject.toml)"
          django_version="$(python_package_version python/logbrew_django/pyproject.toml)"
          {
            echo "version=$core_version"
            echo "core_version=$core_version"
            echo "fastapi_version=$fastapi_version"
            echo "django_version=$django_version"
          } >> "$GITHUB_OUTPUT"

      - name: Build Python distributions
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade build twine
          for package_dir in python/logbrew_py python/logbrew_fastapi python/logbrew_django; do
            output_dir="dist/pypi/$(basename "$package_dir")"
            python -m build --sdist --wheel --outdir "$output_dir" "$package_dir"
            python -m twine check "$output_dir"/*
          done

      - name: Publish logbrew-sdk to PyPI
        if: ${{ ! inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi/logbrew_py
          skip-existing: true

      - name: Publish logbrew-fastapi to PyPI
        if: ${{ ! inputs.dry_run && inputs.include_pypi_extras }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi/logbrew_fastapi
          skip-existing: true

      - name: Publish logbrew-django to PyPI
        if: ${{ ! inputs.dry_run && inputs.include_pypi_extras }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi/logbrew_django
          skip-existing: true

      - name: Explain skipped PyPI extras
        if: ${{ ! inputs.dry_run && ! inputs.include_pypi_extras }}
        run: |
          echo "Published core logbrew-sdk only."
          echo "Set include_pypi_extras=true after logbrew-fastapi and logbrew-django PyPI publishers are configured."

      - name: Verify public PyPI packages
        if: ${{ ! inputs.dry_run }}
        shell: bash
        run: |
          set -Eeuo pipefail
          verify_args=(--target pypi)
          if [[ "${{ inputs.include_pypi_extras }}" == "true" ]]; then
            verify_args+=(--include-pypi-extras)
            verify_args+=(--pypi-version "logbrew-fastapi=${{ steps.pypi-version.outputs.fastapi_version }}")
            verify_args+=(--pypi-version "logbrew-django=${{ steps.pypi-version.outputs.django_version }}")
          fi
          verify_args+=(--version "${{ steps.pypi-version.outputs.version }}")
          python3 scripts/check_registry_publication.py "${verify_args[@]}"

  crates:
    name: crates.io package
    if: ${{ inputs.target == 'all' || inputs.target == 'crates' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Dry-run crate package
        working-directory: rust/logbrew
        run: cargo publish --dry-run

      - name: Authenticate to crates.io
        if: ${{ ! inputs.dry_run && inputs.include_crates_publish }}
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        if: ${{ ! inputs.dry_run && inputs.include_crates_publish }}
        working-directory: rust/logbrew
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: cargo publish

      - name: Set up Python for registry verification
        if: ${{ ! inputs.dry_run && inputs.include_crates_publish }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify public crates.io package
        if: ${{ ! inputs.dry_run && inputs.include_crates_publish }}
        run: python3 scripts/check_registry_publication.py --target crates

      - name: Explain skipped crate publish
        if: ${{ ! inputs.dry_run && ! inputs.include_crates_publish && inputs.target == 'all' }}
        run: |
          echo "Validated the Rust crate dry-run only."
          echo "Set include_crates_publish=true after the logbrew crate ownership/trusted publishing path is configured."

      - name: Refuse implicit crate-only publish
        if: ${{ ! inputs.dry_run && ! inputs.include_crates_publish && inputs.target == 'crates' }}
        run: |
          echo "Refusing a real crates.io publish without include_crates_publish=true."
          echo "Configure the logbrew crate ownership/trusted publishing path first, then rerun target=crates with include_crates_publish=true."
          exit 1

  rubygems:
    name: RubyGems package
    if: ${{ inputs.target == 'all' || inputs.target == 'rubygems' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build gem
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p dist/rubygems
          (
            cd ruby/logbrew-ruby
            gem_file="$(
              ruby -e 'spec = Gem::Specification.load("logbrew-sdk.gemspec") or abort "failed to load logbrew-sdk.gemspec"; print "#{spec.name}-#{spec.version}.gem"'
            )"
            gem build logbrew-sdk.gemspec --strict --output "$GITHUB_WORKSPACE/dist/rubygems/$gem_file"
          )

      - name: Configure RubyGems trusted publishing credentials
        if: ${{ ! inputs.dry_run }}
        uses: rubygems/configure-rubygems-credentials@v2.0.0

      - name: Publish gem
        if: ${{ ! inputs.dry_run }}
        run: gem push dist/rubygems/*.gem

      - name: Set up Python for registry verification
        if: ${{ ! inputs.dry_run }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify public RubyGems package
        if: ${{ ! inputs.dry_run }}
        run: python3 scripts/check_registry_publication.py --target rubygems

  nuget:
    name: NuGet package
    if: ${{ inputs.target == 'all' || inputs.target == 'nuget' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Read NuGet package version
        id: nuget-version
        shell: bash
        run: |
          set -Eeuo pipefail
          core_version="$(dotnet msbuild dotnet/logbrew-dotnet/src/LogBrew/LogBrew.csproj -nologo -getProperty:Version | tail -n 1 | xargs)"
          aspnetcore_version="$(dotnet msbuild dotnet/logbrew-dotnet/src/LogBrew.AspNetCore/LogBrew.AspNetCore.csproj -nologo -getProperty:Version | tail -n 1 | xargs)"
          if [[ -z "$core_version" || -z "$aspnetcore_version" ]]; then
            echo "Could not read NuGet package version from LogBrew.csproj" >&2
            exit 1
          fi
          echo "core_version=$core_version" >> "$GITHUB_OUTPUT"
          echo "aspnetcore_version=$aspnetcore_version" >> "$GITHUB_OUTPUT"

      - name: Validate NuGet release metadata
        run: |
          python3 scripts/check_release_metadata.py \
            --nuget-version "LogBrew=${{ steps.nuget-version.outputs.core_version }}" \
            --nuget-version "LogBrew.AspNetCore=${{ steps.nuget-version.outputs.aspnetcore_version }}"

      - name: Pack NuGet package
        run: |
          dotnet pack dotnet/logbrew-dotnet/src/LogBrew/LogBrew.csproj --configuration Release --output dist/nuget
          dotnet pack dotnet/logbrew-dotnet/src/LogBrew.AspNetCore/LogBrew.AspNetCore.csproj --configuration Release --output dist/nuget

      - name: Authenticate to NuGet
        if: ${{ ! inputs.dry_run }}
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet package
        if: ${{ ! inputs.dry_run }}
        run: dotnet nuget push dist/nuget/*.nupkg --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Set up Python for registry verification
        if: ${{ ! inputs.dry_run }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify public NuGet package
        if: ${{ ! inputs.dry_run }}
        run: |
          python3 scripts/check_registry_publication.py --target nuget \
            --nuget-version "LogBrew=${{ steps.nuget-version.outputs.core_version }}" \
            --nuget-version "LogBrew.AspNetCore=${{ steps.nuget-version.outputs.aspnetcore_version }}" \
            --retries 20 --retry-delay 30

  packagist:
    name: Packagist package
    if: ${{ inputs.target == 'packagist' || (inputs.target == 'all' && (inputs.dry_run || inputs.include_packagist_update)) }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    env:
      PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
      PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Validate Composer packages
        shell: bash
        run: |
          set -Eeuo pipefail
          composer validate --strict composer.json
          composer validate --strict php/logbrew-php/composer.json

      - name: Trigger Packagist update
        if: ${{ ! inputs.dry_run }}
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ -z "${PACKAGIST_USERNAME:-}" || -z "${PACKAGIST_API_TOKEN:-}" ]]; then
            echo "Packagist update settings are not present; relying on Packagist auto-update for the GitHub repository."
            exit 0
          fi
          curl -fsS \
            -X POST \
            -H "content-type: application/json" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            -d '{"repository":{"url":"https://github.com/LogBrewCo/sdk"}}'

      - name: Set up Python for registry verification
        if: ${{ ! inputs.dry_run }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify public Packagist package
        if: ${{ ! inputs.dry_run }}
        run: python3 scripts/check_registry_publication.py --target packagist --retries 20 --retry-delay 30

  maven:
    name: Maven Central package
    if: ${{ inputs.target == 'maven' || (inputs.target == 'all' && (inputs.dry_run || inputs.include_maven_publish)) }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Maven Central deployment bundle
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MAVEN_GPG_KEY_ID: ${{ secrets.MAVEN_GPG_KEY_ID }}
        run: |
          set -Eeuo pipefail
          bundle_args=(--output "$RUNNER_TEMP/logbrew-maven-central-bundle.zip")
          if [[ "${{ inputs.dry_run }}" != "true" ]]; then
            bundle_args+=(--sign)
          fi
          bash scripts/build_maven_central_bundle.sh "${bundle_args[@]}"
          python3 - "$RUNNER_TEMP/logbrew-maven-central-bundle.zip" <<'PY'
          import sys
          import zipfile

          with zipfile.ZipFile(sys.argv[1]) as archive:
              names = archive.namelist()
          print(f"maven central bundle entries ok ({len(names)} files)")
          PY

      - name: Upload Maven Central deployment bundle
        if: ${{ ! inputs.dry_run }}
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: |
          set -Eeuo pipefail
          : "${CENTRAL_PORTAL_USERNAME:?Set CENTRAL_PORTAL_USERNAME as a release environment secret.}"
          : "${CENTRAL_PORTAL_PASSWORD:?Set CENTRAL_PORTAL_PASSWORD as a release environment secret.}"
          central_bearer="$(
            python3 - <<'PY'
          import base64
          import os

          raw = f"{os.environ['CENTRAL_PORTAL_USERNAME']}:{os.environ['CENTRAL_PORTAL_PASSWORD']}".encode()
          print(base64.b64encode(raw).decode())
          PY
          )"
          response="$(
            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${central_bearer}" \
              --form "bundle=@${RUNNER_TEMP}/logbrew-maven-central-bundle.zip" \
              "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC"
          )"
          python3 - "$response" <<'PY'
          import sys

          deployment_id = sys.argv[1].strip()
          if not deployment_id:
              raise SystemExit("Maven Central upload did not return a deployment id")
          print(f"Maven Central deployment submitted: {deployment_id}")
          PY

      - name: Verify Maven Central publication
        if: ${{ ! inputs.dry_run }}
        run: python3 scripts/check_registry_publication.py --target maven --retries 20 --retry-delay 30

  verify:
    name: Public registry verification
    if: ${{ inputs.target == 'verify' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Go for module verification
        if: ${{ inputs.include_go_module }}
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Verify public registry packages
        shell: bash
        env:
          VERIFY_VERSION: ${{ inputs.verify_version }}
          VERIFY_NPM_VERSIONS: ${{ inputs.verify_npm_versions }}
          VERIFY_PYPI_VERSIONS: ${{ inputs.verify_pypi_versions }}
          VERIFY_NUGET_VERSIONS: ${{ inputs.verify_nuget_versions }}
        run: |
          set -Eeuo pipefail
          verify_args=(--target all)
          append_version_overrides() {
            local flag="$1"
            local raw_versions="$2"
            local version_entry
            if [[ -z "$raw_versions" ]]; then
              return
            fi
            IFS=',' read -ra version_entries <<< "$raw_versions"
            for version_entry in "${version_entries[@]}"; do
              version_entry="$(printf '%s' "$version_entry" | xargs)"
              if [[ -n "$version_entry" ]]; then
                verify_args+=("$flag" "$version_entry")
              fi
            done
          }
          if [[ -n "$VERIFY_VERSION" ]]; then
            verify_args+=(--version "$VERIFY_VERSION")
          fi
          append_version_overrides --npm-version "$VERIFY_NPM_VERSIONS"
          append_version_overrides --pypi-version "$VERIFY_PYPI_VERSIONS"
          append_version_overrides --nuget-version "$VERIFY_NUGET_VERSIONS"
          if [[ "${{ inputs.include_unity_npm }}" == "true" ]]; then
            verify_args+=(--include-unity-npm)
          fi
          if [[ "${{ inputs.include_pypi_extras }}" == "true" ]]; then
            verify_args+=(--include-pypi-extras)
          fi
          if [[ "${{ inputs.include_crates_publish }}" == "true" ]]; then
            verify_args+=(--include-crates)
          fi
          if [[ "${{ inputs.include_packagist_update }}" == "true" ]]; then
            verify_args+=(--include-packagist)
          fi
          if [[ "${{ inputs.include_maven_publish }}" == "true" ]]; then
            verify_args+=(--include-maven)
          fi
          if [[ "${{ inputs.include_go_module }}" == "true" ]]; then
            verify_args+=(--include-go)
          fi
          python3 scripts/check_registry_publication.py "${verify_args[@]}"
